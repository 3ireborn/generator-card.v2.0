<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NPA Smart System Card Generator V2.0</title>

<!-- Tailwind -->
<script src="https://cdn.tailwindcss.com"></script>

<!-- html2canvas -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<!-- Google Font -->
<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect"
href="https://fonts.gstatic.com"
crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700;900&family=Cinzel:wght@500;700;900&display=swap"
rel="stylesheet">

<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/card.css">
<link rel="stylesheet" href="css/effects.css">
<link rel="stylesheet" href="css/responsive.css">

</head>

<body class="bg-slate-950 text-white">

<!-- ================= HEADER ================= -->

<header class="py-6 border-b border-yellow-700">

<div class="max-w-7xl mx-auto px-5">

<h1 class="text-center text-4xl font-black text-yellow-400 tracking-wider">

NPA SMART SYSTEM

</h1>

<p class="text-center text-gray-400 mt-2 tracking-[5px]">

BLACK GOLD LUXURY EDITION

</p>

</div>

</header>

<!-- ================= CONTENT ================= -->

<div class="max-w-7xl mx-auto px-5 py-8">

<div class="grid lg:grid-cols-2 gap-10">

<!-- ======================================= -->
<!-- FORM -->
<!-- ======================================= -->

<div>

<div class="bg-slate-900 rounded-2xl p-6 border border-slate-700 shadow-xl">

<h2 class="text-2xl font-bold text-yellow-400 mb-6">

DATA MEMBER

</h2>

<!-- Nama -->

<div class="mb-5">

<label class="block mb-2">

Nama Member

</label>

<input

id="memberName"

type="text"

placeholder="SUGIARTO KURNIAWAN"

class="w-full rounded-xl bg-slate-800 border border-slate-700 p-4 focus:outline-none focus:border-yellow-500">

</div>

<!-- ID -->

<div class="mb-5">

<label class="block mb-2">

ID MEMBER

</label>

<input

id="memberID"

type="text"

placeholder="000022061970"

class="w-full rounded-xl bg-slate-800 border border-slate-700 p-4 focus:outline-none focus:border-yellow-500">

</div>

<!-- Level -->

<div class="mb-5">

<label class="block mb-2">

LEVEL MEMBER

</label>

<select

id="memberLevel"

class="w-full rounded-xl bg-slate-800 border border-slate-700 p-4">

<option>Silver</option>

<option>Gold</option>

<option>Platinum</option>

<option selected>VVIP</option>

</select>

</div>

<!-- Upload Logo -->

<div class="mb-5">

<label class="block mb-2">

Logo NPA

</label>

<input

type="file"

id="logoUpload"

class="w-full">

</div>

<!-- Upload Foto -->

<div class="mb-8">

<label class="block mb-2">

Foto Member

</label>

<input

type="file"

id="photoUpload"

class="w-full">

</div>

<button

id="downloadCard"

class="w-full py-4 rounded-xl bg-yellow-500 hover:bg-yellow-400 text-black font-black text-lg">

DOWNLOAD PNG

</button>

</div>

</div>

<!-- ======================================= -->
<!-- PREVIEW -->
<!-- ======================================= -->

<div>

<div class="flex justify-center">

<div

id="card"

class="card">

<!-- Reflection -->

<div class="reflection"></div>

<!-- Gold Curve -->

<div class="goldCurve"></div>


<div class="light-top"></div>

<div class="light-bottom"></div>
<!-- Header -->

<div class="cardHeader">

<div class="logoArea">

<h1>NPA</h1>

<h2>SMART SYSTEM</h2>

<p>NGANGGUR PRENEUR AKADEMI</p>

</div>

</div>

<!-- Middle -->

<div class="cardMiddle">

<div class="chip"></div>

<div class="vipArea">

<div class="stars">

★★★★★

</div>

<div class="crown">

👑

</div>

<h2>

VVIP MEMBER

</h2>

<div class="stars">

★★★★★

</div>

</div>

</div>

<!-- Footer -->

<div class="cardFooter">

<div>

<label>

NAMA MEMBER

</label>

<h3 id="previewName">

SUGIARTO KURNIAWAN

</h3>

</div>

<div class="mt-5">

<label>

ID MEMBER

</label>

<h4 id="previewID">

000022061970

</h4>

</div>

</div>

<!-- Globe -->

<div class="worldIcon">

🌐

</div>

</div>

</div>

</div>

</div>

</div>

<!-- JS -->

<script src="js/app.js"></script>

<script src="js/download.js"></script>

</body>

</html>
